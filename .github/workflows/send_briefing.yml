on:
  workflow_dispatch:

# 같은 워크플로의 동시 실행 방지 (이중 안전망)
concurrency:
  group: stock-briefing
  cancel-in-progress: false

# gh CLI가 같은 워크플로 실행 기록을 조회하려면 actions:read 권한 필요
permissions:
  actions: read
  contents: read

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 중복 발송 방지:
      # 같은 워크플로의 최근 성공 실행이 5분 이내면 이 실행은 스킵
      - name: Check for recent successful run
        id: dedup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_RUN_ID="${{ github.run_id }}"
          
          # 자신을 제외한 최근 성공 실행의 시각 조회
          RECENT_SUCCESS=$(gh run list \
            --workflow=send_briefing.yml \
            --status=success \
            --limit=5 \
            --json createdAt,databaseId \
            --jq "[.[] | select(.databaseId != $CURRENT_RUN_ID)] | .[0].createdAt // empty")
          
          if [ -n "$RECENT_SUCCESS" ]; then
            NOW_EPOCH=$(date +%s)
            LAST_EPOCH=$(date -d "$RECENT_SUCCESS" +%s)
            DIFF=$((NOW_EPOCH - LAST_EPOCH))
            
            echo "마지막 성공 실행: $RECENT_SUCCESS (${DIFF}초 전)"
            
            # 50분(3000초) 이내면 중복으로 판단 (한 시간에 1번만 발송)
            if [ $DIFF -lt 3000 ]; then
              echo "→ 50분 이내 발송 있음. 중복 방지로 스킵."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "→ 충분히 지났음. 정상 진행."
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "최근 성공 실행 없음. 정상 진행."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python 3.11
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.dedup.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send stock briefing
        if: steps.dedup.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          TZ: Asia/Seoul
        run: python -m src.main
