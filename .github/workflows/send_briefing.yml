name: Send Hourly Stock Briefing

on:
  schedule:
    # 평일 KST 07:23 ~ 22:23 매시 발송 (총 16회/일, 분 단위 :23)
    # GitHub Actions cron은 UTC만 지원하므로 두 줄로 분할.
    
    # UTC 22:23, 23:23 (전날 일~목) = KST 07:23, 08:23 (당일 월~금)
    - cron: '23 22,23 * * 0-4'
    
    # UTC 00:23 ~ 13:23 (당일 월~금) = KST 09:23 ~ 22:23 (당일 월~금)
    - cron: '23 0-13 * * 1-5'

  # 깃허브 UI에서 수동 실행도 가능
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send stock briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          TZ: Asia/Seoul
        run: python -m src.main
